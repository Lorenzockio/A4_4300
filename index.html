<!doctype html>
<html lang='en'>
  <head>
    <meta charset='utf-8'>
    <script src='main.js' type='module'></script>

    <link href='style.css' rel='stylesheet'>
    <link rel='shortcut icon' href='data:image/x-icon;,' type='image/x-icon'> 
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div style="position:absolute; right:10px; top:10px; z-index:1; color:black;font-size:24px;">
    <label>Feed</label>
    <input 
      type="range"
      id="feed"
      min="0.01" max=".1"
      step="0.001"
      value="0.055"
    /><br><br>
    <label>Kill</label>
    <input 
      type="range"
      id="kill"
      min="0.01" max=".1"
      step="0.001"
      value="0.062"
    /><br><br>
    <label>Diffusion A</label>
    <input 
      type="range"
      id="dA"
      min="0." max="1"
      step="0.001"
      value="1.0"
    /><br><br>
    <label>Diffusion B</label>
    <input 
      type="range"
      id="dB"
      min="0.1" max="1"
      step="0.001"
      value="0.5"
    /><br><br>
    <label>Left - Right A</label>
    <input 
      type="range"
      id="LR"
      min="-.1" max=".1"
      step=".01"
      value="0"
    /><br><br>
    <label>Up - Down  A</label>
    <input 
      type="range"
      id="UD"
      min="-.1" max=".1"
      step=".01"
      value="0"
    /><br><br>
    <label>Left - Right B</label>
    <input 
      type="range"
      id="LRB"
      min="-.1" max=".1"
      step=".01"
      value="0"
    /><br><br>
    <label>Up - Down  B</label>
    <input 
      type="range"
      id="UDB"
      min="-.1" max=".1"
      step=".01"
      value="0"
    /><br><br>
    <button id="reset"> Reset</button>
    
    </div>
  </body>
</html>
